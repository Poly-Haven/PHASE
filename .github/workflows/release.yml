name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --quiet

      - name: Build release binary
        run: cargo build --release --quiet

      - name: Package release assets
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $target = "x86_64-pc-windows-msvc"
          $zip = "phase-$tag-$target.zip"
          Copy-Item target\release\phase.exe phase.exe
          Compress-Archive -Path phase.exe -DestinationPath $zip -Force
          "ZIP_ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Generate release notes
        shell: pwsh
        run: |
          $current = "${env:GITHUB_REF_NAME}"
          $tags = git tag --list "v*" --sort=-v:refname
          $previous = $tags | Where-Object { $_ -ne $current } | Select-Object -First 1
          if ($previous) {
            $range = "$previous..$current"
            "# PHASE $current`n`nChanges since ${previous}:`n" | Set-Content release-notes.md
            git log $range --pretty=format:"- %s (%h)" | Add-Content release-notes.md
          } else {
            "# PHASE $current`n`nInitial release.`n" | Set-Content release-notes.md
          }

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if (gh release view $tag *> $null) {
            gh release upload $tag phase.exe $env:ZIP_ASSET --clobber
          } else {
            gh release create $tag phase.exe $env:ZIP_ASSET --title "PHASE $tag" --notes-file release-notes.md
          }
