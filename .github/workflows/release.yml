name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --quiet

      - name: Build release binary
        run: cargo build --release --quiet

      - name: Package release assets
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $target = "x86_64-pc-windows-msvc"
          $zip = "phase-$tag-$target.zip"

          Copy-Item target\release\phase.exe phase.exe
          Compress-Archive -Path phase.exe -DestinationPath $zip -Force
          "ZIP_ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Generate AI release notes
        shell: pwsh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          $current = "${env:GITHUB_REF_NAME}"

          $tags = git tag --list "v*" --sort=-v:refname
          $previous = $tags |
            Where-Object { $_ -ne $current } |
            Select-Object -First 1

          if (-not $previous) {
            "# PHASE $current`n`nInitial release." |
              Set-Content release-notes.md
            exit 0
          }

          $range = "$previous..$current"

          $commits = git log $range `
            --pretty=format:"- %s" `
            --no-merges

          $prompt = @"
          You are writing release notes for a software project.

          Write concise, user-facing release notes in markdown.

          Requirements:
          - Group items into:
            - Features
            - Improvements
            - Fixes
          - Ignore:
            - CI changes
            - formatting
            - refactors
            - dependency updates
            - internal cleanup
          - Rewrite technical commit messages into clear user-facing language
          - Be concise and professional
          - Only include meaningful user-visible changes

          Commits:

          $commits
          "@

          $body = @{
            model = "gpt-5-mini"
            max_completion_tokens = 600
            messages = @(
              @{
                role = "system"
                content = "You write professional software release notes."
              },
              @{
                role = "user"
                content = $prompt
              }
            )
          } | ConvertTo-Json -Depth 10

          try {
            $response = Invoke-RestMethod `
              -Uri "https://api.openai.com/v1/chat/completions" `
              -Method Post `
              -Headers @{
                Authorization = "Bearer $env:OPENAI_API_KEY"
              } `
              -ContentType "application/json" `
              -Body $body

            $notes = $response.choices[0].message.content

            "# PHASE $current`n" |
              Set-Content release-notes.md

            $notes |
              Add-Content release-notes.md
          }
          catch {
            Write-Host "AI release notes failed, falling back to git log."

            "# PHASE $current`n`nChanges since ${previous}:`n" |
              Set-Content release-notes.md

            git log $range `
              --pretty=format:"- %s (%h)" |
              Add-Content release-notes.md
          }

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${env:GITHUB_REF_NAME}"

          if (gh release view $tag *> $null) {
            gh release upload `
              $tag `
              phase.exe `
              $env:ZIP_ASSET `
              --clobber
          }
          else {
            gh release create `
              $tag `
              phase.exe `
              $env:ZIP_ASSET `
              --title "PHASE $tag" `
              --notes-file release-notes.md
          }
